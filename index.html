<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="dcterms.rightsHolder" content="NotFitForPurpose">
  <meta name="dcterms.rights" content="Copyright all rights reserved">
  <meta name="dcterms.dateCopyrighted" content="2025">
  <meta name="description" content="Author: NoFitnessForPurpose, Illustrator: NoFitnessForPurpose, Category: Computers">

  <style>
    body {
      background-color: white;
      color: black;
      transition: background-color 0.3s, color 0.3s;
    }

    ul, #myUL {
      list-style-type: none;
    }

    #myUL {
      margin: 0;
      padding: 10;
    }

    .caret {
      cursor: pointer;
      user-select: none;
    }

    .caret::before {
      content: "\25B6";
      color: black;
      display: inline-block;
      margin-right: 6px;
    }

    .caret-down::before {
      transform: rotate(90deg);  
    }

    .nested {
      display: none;
    }

    .active {
      display: block;
    }

    footer {
      text-align: center;
      padding: 3px;
      background-color: Silver;
      color: black;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Dark Mode Styles */
    body.dark-mode {
      background-color: #121212;
      color: #e0e0e0;
    }

    body.dark-mode a {
      color: #9ecbff;
    }

    body.dark-mode .caret::before {
      color: #e0e0e0;
    }

    body.dark-mode footer {
      background-color: #333;
      color: #e0e0e0;
    }

    /* Toggle Button */
    #darkModeToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 6px 12px;
      background: #ddd;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    body.dark-mode #darkModeToggle {
      background: #444;
      color: #fff;
    }
  </style>
</head>

<body>
  <button id="darkModeToggle">🌙 Dark Mode</button>

  <table>
    <tr>
      <td>
        <img src="./images/NFP-01.jpg" alt="Logo" width="100">
      </td>	
      <td>
	     <h1>&nbsp;&nbsp;github - Curated View</h1>
      </td>
    </tr>	  
  </table>
  
  <p>This view presents a hierarchical view of information in my <span id="RePoCount"></span> public 
     <a target="_blank" rel="noopener noreferrer" href="https://github.com/nofitnessforpurpose?tab=repositories">GitHub repositories</a>.
  </p>
  <p>Hint - Click on the arrow(s) to expand / open or collapse / close the nodes.</p>

  <!-- (Your existing UL content unchanged) -->
  <ul id="myUL">
    <!-- ... full hierarchy here ... -->
  </ul>

  <script>
    // Expand / Collapse
    var toggler = document.getElementsByClassName("caret");
    for (let i = 0; i < toggler.length; i++) {
      toggler[i].addEventListener("click", function() {
        this.parentElement.querySelector(".nested").classList.toggle("active");
        this.classList.toggle("caret-down");
      });
    }

    // Dark Mode Setup
    const toggleButton = document.getElementById("darkModeToggle");

    function applyMode(mode) {
      if (mode === "dark") {
        document.body.classList.add("dark-mode");
        toggleButton.textContent = "☀️ Light Mode";
      } else {
        document.body.classList.remove("dark-mode");
        toggleButton.textContent = "🌙 Dark Mode";
      }
    }

    // Check localStorage first
    const savedMode = localStorage.getItem("theme");
    if (savedMode) {
      applyMode(savedMode);
    } else {
      // Fall back to system preference
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      applyMode(prefersDark ? "dark" : "light");
    }

    // Toggle button click
    toggleButton.addEventListener("click", () => {
      const isDark = document.body.classList.contains("dark-mode");
      if (isDark) {
        applyMode("light");
        localStorage.setItem("theme", "light");
      } else {
        applyMode("dark");
        localStorage.setItem("theme", "dark");
      }
    });
  </script>

  <br><br>
</body>

<footer>
  <p>Author: NotFitForPurpose</p>
  <p style="color:#ccd1d1">(c) NotFitForPurpose 2024, 2025 All Rights Reserved.</p>
</footer> 

<!-- Get the number of repositories -->
<script>
  async function updateRepoCount() {
    const response = await fetch("https://api.github.com/users/nofitnessforpurpose/repos");
    const data = await response.json();
    var count = data.length;
    document.getElementById("RePoCount").innerHTML = count - 2; 
  }
  updateRepoCount();
</script>	
</html>
